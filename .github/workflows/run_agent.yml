name: Daily ASICS Shoe Deal Check

on:
  schedule:
    # Runs automatically every day at 8:00 AM UTC (Adjust as needed)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to trigger it manually via a button on GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-level: '3.10'

    - name: Install Scraping Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Agent
      env:
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: python agent.py
